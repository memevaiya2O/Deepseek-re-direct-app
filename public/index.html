<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal - Prime Xyron</title>
    <style>
        body { background: #0b0c10; color: #c5c6c7; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: rgba(31, 40, 51, 0.8); padding: 15px 20px; border-bottom: 1px solid #45a29e; box-shadow: 0 0 10px rgba(102, 252, 241, 0.2); backdrop-filter: blur(5px); color: #66fcf1; font-weight: bold; font-size: 20px; text-transform: uppercase; letter-spacing: 1px; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 75%; padding: 12px 18px; border-radius: 12px; font-size: 15px; line-height: 1.6; }
        .user { align-self: flex-end; background: #45a29e; color: #0b0c10; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: rgba(31, 40, 51, 0.7); border: 1px solid #45a29e; color: #66fcf1; border-bottom-left-radius: 2px; }
        #input-area { background: rgba(31, 40, 51, 0.9); padding: 15px; display: flex; gap: 10px; border-top: 1px solid #45a29e; }
        input { flex: 1; background: #0b0c10; border: 1px solid #45a29e; color: #fff; padding: 12px; border-radius: 25px; outline: none; font-size: 15px; }
        input:focus { border-color: #66fcf1; box-shadow: 0 0 5px rgba(102, 252, 241, 0.5); }
        button { background: #66fcf1; color: #0b0c10; border: none; padding: 10px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #45a29e; box-shadow: 0 0 10px #45a29e; }
    </style>
</head>
<body>
    <header>Terminal _</header>
    <div id="chat-container">
        <div class="msg ai">System Online. Awaiting prompt.</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Execute command..." onkeypress="if(event.key === 'Enter') sendMsg()">
        <button onclick="sendMsg()">Run</button>
    </div>

    <script>
        async function sendMsg() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if(!text) return;

            appendMsg(text, 'user');
            input.value = '';
            const aiDiv = appendMsg('Processing...', 'ai');

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                aiDiv.innerText = data.reply || data.error;
            } catch (e) {
                aiDiv.innerText = "Connection Timeout.";
            }
            
            const container = document.getElementById('chat-container');
            container.scrollTop = container.scrollHeight;
        }

        function appendMsg(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            const container = document.getElementById('chat-container');
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
